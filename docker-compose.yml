services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=cHkDd4fV+sDXGd940JT0o2R0uE//riXA8DKvf91EKWU=
      - WIREGUARD_ADDRESSES=10.72.1.181/32
      - FIREWALL=on
      - FIREWALL_VPN_INPUT_PORTS=6881
      - FIREWALL_OUTBOUND_SUBNETS=192.168.0.0/16,10.0.0.0/8
      - SERVER_COUNTRIES=USA
      - TZ=America/New_York
      - DOT=off
    volumes:
      - /opt/docker/gluetun:/gluetun
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    runtime: nvidia
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - /opt/docker/plex:/config
      - /mnt/eltzroth/media/movies:/data/movies
      - /mnt/eltzroth/media/3d-movies:/data/3d-movies
      - /mnt/eltzroth/media/tv:/data/tv
      - /mnt/eltzroth/media/music:/data/music
      - /mnt/eltzroth/media/home-movies:/data/home-movies
      - /mnt/eltzroth/media/home-videos:/data/home-videos
      - /mnt/eltzroth/media/audiobooks:/data/audiobooks
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - WEBUI_PORT=8080
    volumes:
      - /opt/docker/qbittorrent:/config
      - /mnt/eltzroth/downloads:/downloads
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/docker/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/docker/sonarr:/config
      - /mnt/eltzroth/downloads:/downloads
      - /mnt/eltzroth/media:/media
    ports:
      - "8989:8989"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/docker/radarr:/config
      - /mnt/eltzroth/downloads:/downloads
      - /mnt/eltzroth/media:/media
    ports:
      - "7878:7878"
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/docker/bazarr:/config
      - /mnt/eltzroth/media:/media
    ports:
      - "6767:6767"
    restart: unless-stopped

  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/docker/overseerr:/config
    ports:
      - "5055:5055"
    restart: unless-stopped

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    environment:
      - TZ=America/New_York
    volumes:
      - /mnt/eltzroth/media/audiobooks:/audiobooks
      - /mnt/eltzroth/media/music:/music
      - /opt/docker/audiobookshelf/config:/config
      - /opt/docker/audiobookshelf/metadata:/metadata
    ports:
      - "13378:80"
    restart: unless-stopped

  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/docker/tautulli:/config
    ports:
      - "8181:8181"
    restart: unless-stopped

  ersatztv:
    image: ghcr.io/ersatztv/ersatztv:latest
    container_name: ersatztv
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/docker/ersatztv:/config
      - /mnt/eltzroth/media:/media
    ports:
      - "8409:8409"
    restart: unless-stopped

  paperless-redis:
    image: redis:7
    container_name: paperless-redis
    volumes:
      - /opt/docker/paperless/redis:/data
    restart: unless-stopped

  paperless-db:
    image: postgres:15
    container_name: paperless-db
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=paperless
    volumes:
      - /opt/docker/paperless/db:/var/lib/postgresql/data
    restart: unless-stopped

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    depends_on:
      - paperless-db
      - paperless-redis
    ports:
      - "8001:8000"
    environment:
      - USERMAP_UID=1000
      - USERMAP_GID=1000
      - PAPERLESS_REDIS=redis://paperless-redis:6379
      - PAPERLESS_DBHOST=paperless-db
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=paperless
      - PAPERLESS_SECRET_KEY=CHANGE_THIS_TO_A_LONG_RANDOM_STRING
      - PAPERLESS_TIME_ZONE=America/New_York
      - PAPERLESS_OCR_LANGUAGE=eng
      - PAPERLESS_CONSUMER_POLLING=60
      - PAPERLESS_URL=http://10.0.0.87:8001
    volumes:
      - /opt/docker/paperless/data:/usr/src/paperless/data
      - /mnt/eltzroth/documents/paperless/media:/usr/src/paperless/media
      - /mnt/eltzroth/documents/paperless/export:/usr/src/paperless/export
      - /mnt/eltzroth/documents/paperless/consume:/usr/src/paperless/consume
      - /mnt/eltzroth/documents:/documents:ro
    restart: unless-stopped

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich_postgres
    environment:
      - POSTGRES_PASSWORD=immich
      - POSTGRES_USER=immich
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - /opt/docker/immich/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  immich-redis:
    image: redis:6.2-alpine
    container_name: immich_redis
    restart: unless-stopped

  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich
    depends_on:
      - immich-postgres
      - immich-redis
      - immich-machine-learning
    environment:
      - TZ=America/New_York
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=immich
      - DB_PASSWORD=immich
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
      - IMMICH_MACHINE_LEARNING_URL=http://immich-machine-learning:3003
      - UPLOAD_LOCATION=/usr/src/app/upload
    volumes:
      - /mnt/eltzroth/media/photos/immich-upload:/usr/src/app/upload
      - /mnt/eltzroth/media/photos:/external:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "2283:2283"
    restart: unless-stopped

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release-cuda
    container_name: immich_ml
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - /opt/docker/immich/model-cache:/cache
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - /opt/docker/ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
     - HOMEPAGE_ALLOWED_HOSTS=*
    volumes:
      - /opt/docker/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    user: "1000:1000"
    volumes:
      - /mnt/eltzroth:/srv
      - /opt/docker/filebrowser:/database
    ports:
      - "8081:80"
    restart: unless-stopped

  netdata:
    image: netdata/netdata
    container_name: netdata
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    volumes:
      - /opt/docker/netdata/config:/etc/netdata
      - /opt/docker/netdata/lib:/var/lib/netdata
      - /opt/docker/netdata/cache:/var/cache/netdata
      - /:/host/root:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - /opt/docker/uptime-kuma:/app/data
    restart: unless-stopped

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    command:
      - serve
    environment:
      - TZ=America/New_York
    volumes:
      - /opt/docker/ntfy/cache:/var/cache/ntfy
      - /opt/docker/ntfy/config:/etc/ntfy
    ports:
      - "8082:80"
    restart: unless-stopped

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    user: "1000:1000"
    environment:
      - TZ=America/New_York
    volumes:
      - /opt/docker/recyclarr:/config
    restart: unless-stopped

  kometa:
    image: kometateam/kometa:latest
    container_name: kometa
    environment:
      - TZ=America/New_York
      - KOMETA_RUN=true
    volumes:
      - /opt/docker/kometa:/config
    restart: unless-stopped

  scrutiny:
    image: ghcr.io/analogj/scrutiny:master-omnibus
    container_name: scrutiny
    cap_add:
      - SYS_RAWIO
    privileged: true
    ports:
      - "8083:8080"
    volumes:
      - /opt/docker/scrutiny/config:/opt/scrutiny/config
      - /opt/docker/scrutiny/influxdb:/opt/scrutiny/influxdb
      - /run/udev:/run/udev:ro
    restart: unless-stopped
    
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    environment:
      - TZ=America/New_York
      - PUID=1000
      - PGID=1000
      - BASE_URL=http://100.96.227.62:9001
    volumes:
      - /opt/docker/mealie:/app/data
    ports:
      - "9001:9000"
    restart: unless-stopped
